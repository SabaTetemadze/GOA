<html>
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap');
      body{
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: hsl(212, 45%, 89%);
      }
      #panel{
        height: 450px;
        width: 300px;
        background-color: white;
        border-radius: 20px;
        display: flex;
        align-items: center;
        flex-direction: column;
      }
      img{
        height: 275px;
        aspect-ratio: 1/1;
        margin: 12.5px;
        border-radius: 10px;
      }
      p, h2{
        font-family: Outfit;
        text-align: center;
      }
      h2{
        margin-top: 0;
        color: hsl(218, 44%, 22%);
        margin-bottom: 10px;
      }
      p{
        margin: 10px;
        margin-top: 0;
        color: hsl(216, 15%, 48%);
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <img src="./qr-code-component-main/images/image-qr-code.png">
      <h2>Improve your front-end skills by building projects</h2>
      <p>Scan the QR code to visit Frontend Mentor and take coding skills to the next level</p>
    </div>
  </body>
</html>
