<!-- 
position კუთვნილება გამოიყენება რაიმე ლემენტის გადატანისთვის

static - დეფაულტი, ვერ გაამოძრავებ, იქ იქნება სადაც საიტის კოდი გადაწყვიტავს
relative - დეფაულტისავით, მაგრამ გამოძრავება შეგიძლია, მოძრაობს თავის ძველი ადგილის შედარებით, მოძრაობს მხოლოდ ვიზუალურად
absolute - ამოძრავებ თავისი მშობლის (თუ მშობელს აქვს გაწერილი position: relative, absolute ან fixed, თუ ეგეთი მშობელი არ ყავს მაშინ body-დან) დამწყები კუთხიდან
fixed - ამოძრავებს ეკრანის დამძყები კუთხიდან და იქ რჩება, სქროლის დროსაც
-->
