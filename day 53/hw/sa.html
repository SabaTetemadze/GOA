<!-- დავასრულე type shi -->
<html>
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
      body{
        background-color: hsl(0, 0%, 8%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #panel{
        background-color: hsl(0, 0%, 12%);
        height: 620px;
        width: 400px;
        border-radius: 15px;
        display: flex;
        align-items: center;
        flex-direction: column;
        
      }
      img{
        height: 70px;
        width: 70px;
        border-radius: 50%;
        margin-top: 40px;
        margin-bottom:10px;
      }
      h2{
        color: white;
        font-weight: 400;
        margin: 5px;
      }
      h2, p, button{
        font-family:Inter;
      }
      #h3{
        color: hsl(75, 94%, 57%);
        margin: 5px;
        font-size: 14px;
      }
      #h4{
        color: white;
        font-size: 14px;
      }
      button{
        background-color: hsl(0, 0%, 20%) ;
        color: white;
        border-radius: 10px;
        font-weight: 600;
        border: none;
        width: 300px;
        height: 50px;
        margin: 10px;
        &:hover{
          background-color: hsl(75, 94%, 57%);
          color: black;
          cursor: pointer;
        }
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <img src="./social-links-profile-main/assets/images/avatar-jessica.jpeg">
      <h2>Jessica Randall</h2>
      <p id="h3">London, United Kingdom</p>
      <p id="h4">"Front-end developer and avid reader"</p>
      <button>GitHub</button>
      <button>FrontEnd Mentor</button>
      <button>Linkedln</button>
      <button>Twitter</button>
      <button>Instagram</button>
    </div>
  </body>
</html>
