<html>
  <head>
    <style>
      div {
        background-color: black;
        text-align: center;
      }
      #one p{
        font-size: 20px;
      }
      #two p{
        font-size:24px;
      }
      .first-three{
        font-weight: 700;
      }
      .last-two{
        font-weight: 200;
      }
    </style>
  </head>

  <body>
    <div id="all">


        <div id="one">

          <p class="first-three" style="color: red;">one</p>
          <p class="first-three" style="color: cyan;">two</p>

        </div>

        <div id="two">

          <p class="first-three" style="color: green;">three</p>
          <p class="last-two" style="color: blue;">four</p>
          <p class="last-two" style="color: purple;">five</p>

      </div>


    </div>
  </body>
</html>
