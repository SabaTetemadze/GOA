<html>
  <head>
    <style>
      #yes {
        background-color: yellow;
        align-items: center;
      }
      #one p{
        font-weight: 700;
      }
      #two p{
        font-weight: 200;
      }
    </style>
  </head>

  <body>
    <div id="yes">
      <div id="one">
        <p style="color: red;">one</p>
        <p style="color: cyan;">two</p>
        <p style="color: green;">three</p>
      </div>
      <div id="two">
        <p style="color: blue;">four</p>
        <p style="color: purple;">five</p>
      </div>
    </div>
  </body>
</html>
