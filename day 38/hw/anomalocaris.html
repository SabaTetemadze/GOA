<!-- 
inline css იწერება პირდაპირ თეგებში და ცუდი პრაქტიკაა რადგან 1) თუ ბერვრი თეგის გასტილვა გინდა ერთი და იგივე კოდის გამეორება დაგვჭირდება, 2) ლამაზიც არაა
internal css ცალკე style თეგში იწერება და კარგი პრაქტიკაა
external css იწერება ცალკე ფაილში, ჩემი აზრით საუკეთესო პრაქტიკაა

selector-ს მეშვეობით შეგვეძლია რამოდენიმე თეგი ერთად გავსტილოთ, მაგალითად ყველა p იყოს წითელი, ასევე შეგვიძლია შევირჩიოთ კლასი ან აიდი
-->


<html>
  <head>
    <style>
      div {
        text-align: center;
        color: darkred;
      }
      #first{
        font-size: larger;
        font: lighter;

        background-color: rgb(55, 55, 255);
        border-radius: 15px;
      }
      #second{
        font-size: smaller ;
        font-weight: bolder;
        border: solid green;
        background-color: darkgreen;
        border-radius: 15px;
      }
      button{
        background-color: darkred;
        color: red;
        border-radius: 10px;
        border-color: rgb(255, 35, 35);
      }
    </style>
  </head>
  <body>
    <div id="first">
      <h1>paleozoic</h1>

    </div><br><br>

</html>
